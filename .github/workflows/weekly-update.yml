name: Weekly SoundCloud Update

on:
  workflow_dispatch:
    inputs:
      hours_back:
        description: Optional lookback override in hours
        required: false
        default: ""
  schedule:
    - cron: "20 13 * * 5"
    - cron: "20 14 * * 5"

permissions:
  contents: write

concurrency:
  group: soundcloud-weekly-update
  cancel-in-progress: false

jobs:
  run-weekly-update:
    runs-on: ubuntu-latest
    env:
      GH_ACTIONS_SECRET_PAT: ${{ secrets.GH_ACTIONS_SECRET_PAT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Keep only the real Friday 9:20 AM Eastern run
        id: schedule_guard
        if: github.event_name == 'schedule'
        shell: bash
        env:
          TRIGGER_CRON: ${{ github.event.schedule }}
        run: |
          python3 - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
      
          ny = datetime.now(ZoneInfo("America/New_York"))
          cron = os.environ["TRIGGER_CRON"]
      
          is_dst = ny.dst().total_seconds() != 0
      
          # During DST, 9:20 AM ET = 13:20 UTC
          # During standard time, 9:20 AM ET = 14:20 UTC
          should_run = (
              ny.weekday() == 4 and (
                  (is_dst and cron == "20 13 * * 5") or
                  ((not is_dst) and cron == "20 14 * * 5")
              )
          )
      
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"should_run={'true' if should_run else 'false'}\n")
              output.write(f"local_time={ny.isoformat()}\n")
              output.write(f"trigger_cron={cron}\n")
              output.write(f"is_dst={str(is_dst).lower()}\n")
          PY
      - name: Log schedule decision
        if: github.event_name == 'schedule'
        run: |
          echo "trigger cron: ${{ steps.schedule_guard.outputs.trigger_cron }}"
          echo "local time:    ${{ steps.schedule_guard.outputs.local_time }}"
          echo "is dst:        ${{ steps.schedule_guard.outputs.is_dst }}"
          echo "should run:    ${{ steps.schedule_guard.outputs.should_run }}"
      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: github.event_name == 'workflow_dispatch' || steps.schedule_guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Materialize SoundCloud secrets
        if: github.event_name == 'workflow_dispatch' || steps.schedule_guard.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir -p data
          printf '%s' '${{ secrets.SC_SECRETS_ENV }}' > secrets.env
          printf '%s' '${{ secrets.SC_TOKEN_JSON }}' > sc_token.json

      - name: Run weekly updater
        if: github.event_name == 'workflow_dispatch' || steps.schedule_guard.outputs.should_run == 'true'
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.hours_back }}" ]; then
            python scheduled_run.py --hours-back "${{ github.event.inputs.hours_back }}"
          else
            python scheduled_run.py
          fi

      - name: Upload run artifacts
        if: always() && (github.event_name == 'workflow_dispatch' || steps.schedule_guard.outputs.should_run == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: weekly-update-artifacts
          path: |
            albums_added.txt
            data/app.db
          if-no-files-found: warn

      - name: Persist liked album tracker
        if: success() && (github.event_name == 'workflow_dispatch' || steps.schedule_guard.outputs.should_run == 'true')
        shell: bash
        run: |
          if git diff --quiet -- albums_added.txt; then
            echo "albums_added.txt did not change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add albums_added.txt
          git commit -m "chore: update liked albums tracker"
          git push

      - name: Persist refreshed token secret
        if: success() && (github.event_name == 'workflow_dispatch' || steps.schedule_guard.outputs.should_run == 'true') && env.GH_ACTIONS_SECRET_PAT != ''
        env:
          GH_TOKEN: ${{ env.GH_ACTIONS_SECRET_PAT }}
        run: gh secret set SC_TOKEN_JSON < sc_token.json
